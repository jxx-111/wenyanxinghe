<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>纹衍星河 · 纹样基因库（118种）</title>
    <style>
        /* ========== 样式与之前完全一致（此处复用完整样式，确保所有功能正常） ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0b0b12;
            --bg-card: #1a1a2e;
            --bg-panel: #13131f;
            --gold: #c9a96e;
            --gold-light: #e5c687;
            --red: #b34247;
            --text-primary: #ede7dd;
            --text-secondary: #b9b3a8;
            --text-muted: #7e7a72;
            --border: #2a2838;
            --border-light: #3a3850;
            --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', serif;
            --font-sans: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --shadow-gold: 0 0 30px rgba(201, 169, 110, 0.25);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            --radius-lg: 22px;
        }

        body {
            margin: 0;
            font-family: var(--font-sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            display: block;
        }

        /* 导航栏样式 */
        .nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1400px;
            z-index: 1000;
            background: rgba(11, 11, 18, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            border-radius: 60px;
            border: 1px solid rgba(201, 169, 110, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(201, 169, 110, 0.1) inset;
            transition: var(--transition-smooth);
        }
        .nav.scrolled {
            background: rgba(11, 11, 18, 0.94);
            border-color: rgba(201, 169, 110, 0.6);
            top: 12px;
            width: 92%;
        }
        .nav-inner {
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
        }
        .logo {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(201,169,110,0.4);
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a855, #c4544a, #a83850);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #fff;
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse { 0%,100% { box-shadow: 0 0 18px rgba(200,150,100,0.35); } 50% { box-shadow: 0 0 32px rgba(220,170,110,0.7); } }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 32px;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: var(--transition-smooth);
            position: relative;
            padding: 8px 4px;
        }
        .nav-links a:hover { color: var(--gold-light); }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2.5px;
            background: linear-gradient(90deg, var(--gold), var(--red));
            transition: var(--transition-smooth);
            border-radius: 2px;
        }
        .nav-links a:hover::after { width: 100%; }
        .nav-links .nav-cta {
            padding: 12px 28px;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--gold), #b88a50);
            color: #1a1a14 !important;
            font-weight: 700;
            letter-spacing: 1.5px;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(201,169,110,0.3);
        }
        .nav-links .nav-cta:hover {
            background: linear-gradient(135deg, #e5c687, #d4a55a);
            transform: translateY(-3px);
        }
        @media (max-width: 900px) {
            .nav-inner { padding: 0 20px; height: 70px; }
            .logo { font-size: 1.4rem; }
            .logo-icon { width: 38px; height: 38px; font-size: 1.3rem; }
            .nav-links { gap: 16px; }
            .nav-links a { font-size: 0.9rem; }
            .nav-links .nav-cta { padding: 8px 18px; }
        }
        @media (max-width: 700px) { .nav-links { display: none; } }

        /* 装饰角标 */
        .corner-embroidery {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            opacity: 0.35;
        }
        .corner-embroidery.top-left { top: 100px; left: 24px; width: 70px; height: 70px; }
        .corner-embroidery.top-right { top: 100px; right: 24px; width: 70px; height: 70px; }
        .corner-embroidery.bottom-left { bottom: 40px; left: 24px; width: 60px; height: 60px; }
        .qiang-diamond {
            width: 100%;
            height: 100%;
            border: 1.5px solid rgba(201,169,110,0.5);
            transform: rotate(45deg);
            border-radius: 4px;
            animation: diamondFloat 6s ease-in-out infinite;
            position: relative;
        }
        .qiang-diamond::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(179,66,71,0.4);
        }
        @keyframes diamondFloat { 0%,100% { transform: rotate(45deg) translateY(0); } 50% { transform: rotate(45deg) translateY(-10px); } }

        /* 主内容区 */
        .section {
            position: relative;
            z-index: 2;
            padding: 130px 28px 80px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-header { text-align: center; margin-bottom: 40px; }
        .tag {
            display: inline-block;
            padding: 6px 20px;
            border: 1px solid #5e4e30;
            border-radius: 30px;
            color: var(--gold);
            font-size: 0.85rem;
            letter-spacing: 2px;
            background: rgba(201,169,110,0.08);
        }
        h2 {
            font-family: var(--font-serif);
            font-size: 2.6rem;
            letter-spacing: 4px;
            color: #fff;
            margin: 16px 0 8px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        .subhead { color: var(--text-secondary); font-size: 1rem; letter-spacing: 1px; margin-bottom: 20px; }
        .divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 24px auto;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(26,26,46,0.6);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 16px 32px;
            text-align: center;
            border: 1px solid rgba(201,169,110,0.2);
            min-width: 160px;
        }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: var(--gold); }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 6px; }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .filter-btn {
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(26,26,46,0.6);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition-smooth);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, var(--gold), #b88a50);
            color: #1a1a14;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(201,169,110,0.4);
        }
        .filter-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold-light); }

        .search-box { text-align: center; margin-bottom: 40px; }
        .search-box input {
            width: 500px;
            max-width: 85%;
            padding: 16px 28px;
            border-radius: 60px;
            border: 1.5px solid var(--border-light);
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(4px);
        }
        .search-box input:focus { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,169,110,0.5); }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 28px;
        }
        .pattern-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px 16px 24px;
            text-align: center;
            border: 1px solid transparent;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
        }
        .pattern-card:hover {
            border-color: var(--gold);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,169,110,0.3) inset;
            transform: translateY(-8px) scale(1.02);
        }
        .pattern-card svg {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px;
            color: var(--gold);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            transition: 0.3s;
        }
        .pattern-card:hover svg { transform: scale(1.05); color: var(--gold-light); }
        .pattern-card h4 { font-family: var(--font-serif); font-size: 1.3rem; letter-spacing: 1px; margin: 12px 0 6px; }
        .pattern-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .ai-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.7rem;
            background: rgba(201,169,110,0.2);
            padding: 4px 8px;
            border-radius: 20px;
            color: var(--gold-light);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            backdrop-filter: blur(12px);
            z-index: 2000;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: linear-gradient(145deg, #1a1a2e, #13131f);
            border-radius: 36px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            border: 1px solid rgba(201,169,110,0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.8rem;
            cursor: pointer;
        }
        .modal-close:hover { color: var(--gold); }
        .modal-ai-btn {
            margin-top: 20px;
            padding: 8px 20px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--gold), #b88a50);
            color: #1a1a14;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .modal-ai-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(201,169,110,0.4); }
        .ai-response {
            margin-top: 16px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            font-size: 0.85rem;
            text-align: left;
            color: var(--text-secondary);
        }

        /* 可移动娃娃 */
        .interactive-doll {
            position: fixed;
            width: 140px;
            height: 140px;
            cursor: grab;
            z-index: 1001;
            transition: filter 0.2s, transform 0.1s;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.3));
            user-select: none;
            touch-action: none;
            will-change: left, top;
        }
        .interactive-doll:active { cursor: grabbing; }
        .interactive-doll.dragging { transition: none; animation: none; cursor: grabbing; filter: drop-shadow(0 12px 25px rgba(201,169,110,0.6)); }
        .interactive-doll:not(.dragging) { animation: dollFloat 3s ease-in-out infinite; }
        @keyframes dollFloat { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .interactive-doll:hover:not(.dragging) { transform: scale(1.05); filter: drop-shadow(0 12px 20px rgba(201,169,110,0.5)); }
        .doll-svg { width: 100%; height: 100%; display: block; pointer-events: none; }
        .doll-speech {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26,26,46,0.98);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 12px 18px;
            min-width: 200px;
            max-width: 260px;
            font-size: 0.9rem;
            color: var(--gold-light);
            border: 1.5px solid var(--gold);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
            text-align: center;
            margin-bottom: 10px;
        }
        .doll-speech.show { opacity: 1; }
        @media (max-width: 700px) {
            .interactive-doll { width: 110px; height: 110px; }
            .doll-speech { font-size: 0.75rem; min-width: 160px; max-width: 200px; padding: 8px 12px; }
        }
    </style>
</head>

<script>

    // 动态生成筛选按钮
    const categoriesSet = new Set(patternsData.map(p => p.tag));
    const filterBar = document.getElementById('filterBar');
    filterBar.innerHTML = '<button class="filter-btn active" data-filter="all">全部</button>';
    Array.from(categoriesSet).sort().forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.setAttribute('data-filter', tag);
        btn.textContent = tag;
        filterBar.appendChild(btn);
    });
    document.getElementById('categoryCount').innerText = categoriesSet.size;

    let currentFilter = 'all';
    let currentSearch = '';

    function renderGrid() {
        let filtered = patternsData.filter(p => {
            if (currentFilter !== 'all' && p.tag !== currentFilter) return false;
            if (currentSearch && !p.name.toLowerCase().includes(currentSearch.toLowerCase())) return false;
            return true;
        });
        const grid = document.getElementById('patternGrid');
        grid.innerHTML = '';
        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'pattern-card';
            card.innerHTML = `
                <div class="ai-badge">✨ AI解读</div>
                <svg viewBox="0 0 100 100">${p.svg}</svg>
                <h4>${p.name}</h4>
                <span class="pattern-tag">${p.tag}</span>
            `;
            card.onclick = () => openModal(p);
            grid.appendChild(card);
        });
        document.getElementById('totalCount').innerText = filtered.length;
    }

    let currentPattern = null;
    function openModal(pattern) {
        currentPattern = pattern;
        document.getElementById('modalBody').innerHTML = `
            <h3 style="font-family:var(--font-serif); font-size:1.8rem;">${pattern.name}</h3>
            <div style="margin:20px;"><svg viewBox="0 0 100 100" width="160" height="160" style="color:var(--gold);">${pattern.svg}</svg></div>
            <p style="color:var(--text-secondary); margin-bottom:8px;">${pattern.desc}</p>
            <p style="font-size:0.8rem;">🔍 AI拆解：符号层 · 结构层 · 基因层</p>
        `;
        document.getElementById('aiResponse').style.display = 'none';
        document.getElementById('modal').classList.add('active');
    }

    window.closeModal = function() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('aiResponse').style.display = 'none';

    // 筛选交互
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderGrid();
        });
    });

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderGrid();
    });

    const modalEl = document.getElementById('modal');
    modalEl.addEventListener('click', (e) => { if (e.target === modalEl) closeModal(); });

    const navEl = document.getElementById('mainNav');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) navEl.classList.add('scrolled');
        else navEl.classList.remove('scrolled');
    });

    // ----- 娃娃拖拽与交互（保持不变）-----
    const doll = document.getElementById('interactiveDoll');
    const dollSpeech = document.getElementById('dollSpeech');
    let eyeLeft = document.querySelector('.eye-left');
    let eyeRight = document.querySelector('.eye-right');
    let blinkInterval, pressTimer = null;
    let isDragging = false;
    let dragStartX, dragStartY, startLeft, startTop;

    function loadDollPosition() {
        const savedLeft = localStorage.getItem('doll_left');
        const savedTop = localStorage.getItem('doll_top');
        if (savedLeft !== null && savedTop !== null) {
            doll.style.left = savedLeft + 'px';
            doll.style.top = savedTop + 'px';
        } else {
            const w = window.innerWidth, h = window.innerHeight;
            doll.style.left = (w - doll.offsetWidth - 30) + 'px';
            doll.style.top = (h - doll.offsetHeight - 30) + 'px';
        }
    }
    function saveDollPosition() {
        const left = parseInt(doll.style.left, 10);
        const top = parseInt(doll.style.top, 10);
        if (!isNaN(left) && !isNaN(top)) { localStorage.setItem('doll_left', left); localStorage.setItem('doll_top', top); }
    }
    function clampDollPosition() {
        const w = window.innerWidth, h = window.innerHeight;
        let left = parseInt(doll.style.left, 10), top = parseInt(doll.style.top, 10);
        if (isNaN(left)) left = w - doll.offsetWidth - 30;
        if (isNaN(top)) top = h - doll.offsetHeight - 30;
        left = Math.min(Math.max(left, 10), w - doll.offsetWidth - 10);
        top = Math.min(Math.max(top, 70), h - doll.offsetHeight - 10);
        doll.style.left = left + 'px';
        doll.style.top = top + 'px';
    }
    function onDragStart(e) {
        e.preventDefault();
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
        if (!clientX || !clientY) return;
        const rect = doll.getBoundingClientRect();
        startLeft = rect.left; startTop = rect.top;
        dragStartX = clientX - startLeft; dragStartY = clientY - startTop;
        isDragging = false;
        doll.classList.add('dragging');
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('mouseup', onDragEnd);
        window.addEventListener('touchmove', onDragMove, { passive: false });
        window.addEventListener('touchend', onDragEnd);
    }
    function onDragMove(e) {
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
        if (!clientX || !clientY) return;
        let newLeft = clientX - dragStartX;
        let newTop = clientY - dragStartY;
        const w = window.innerWidth, h = window.innerHeight;
        newLeft = Math.min(Math.max(newLeft, 10), w - doll.offsetWidth - 10);
        newTop = Math.min(Math.max(newTop, 70), h - doll.offsetHeight - 10);
        doll.style.left = newLeft + 'px';
        doll.style.top = newTop + 'px';
        if (!isDragging && (Math.abs(newLeft - startLeft) > 5 || Math.abs(newTop - startTop) > 5)) {
            isDragging = true;
            if (pressTimer) clearTimeout(pressTimer);
        }
        e.preventDefault();
    }
    function onDragEnd(e) {
        window.removeEventListener('mousemove', onDragMove);
        window.removeEventListener('mouseup', onDragEnd);
        window.removeEventListener('touchmove', onDragMove);
        window.removeEventListener('touchend', onDragEnd);
        doll.classList.remove('dragging');
        if (isDragging) { clampDollPosition(); saveDollPosition(); }
        isDragging = false;
    }
    function onDollClick(e) {
        if (isDragging) return;
        e.stopPropagation();
        const randomIndex = Math.floor(Math.random() * patternsData.length);
        const pattern = patternsData[randomIndex];
        showSpeech(`✨ 推荐纹样“${pattern.name}”：${pattern.desc.substring(0, 70)}...`, 4500);
        blink();
        const smile = document.querySelector('.doll-svg path:last-of-type');
        if (smile && smile.getAttribute('d') === 'M44 42 Q50 48 56 42') {
            smile.setAttribute('d', 'M44 42 Q50 54 56 42');
            setTimeout(() => smile.setAttribute('d', 'M44 42 Q50 48 56 42'), 500);
        }
    }
    function onLongPress() { if (!isDragging) window.location.href = '创新设计.html'; }
    function showSpeech(text, duration) {
        dollSpeech.textContent = text;
        dollSpeech.classList.add('show');
        clearTimeout(window.speechTimeout);
        window.speechTimeout = setTimeout(() => dollSpeech.classList.remove('show'), duration);
    }
    function blink() {
        if (!eyeLeft || !eyeRight) return;
        eyeLeft.setAttribute('ry', '0.5');
        eyeRight.setAttribute('ry', '0.5');
        setTimeout(() => { eyeLeft.setAttribute('ry', '2.5'); eyeRight.setAttribute('ry', '2.5'); }, 150);
    }
    doll.addEventListener('mousedown', onDragStart);
    doll.addEventListener('touchstart', onDragStart, { passive: false });
    doll.addEventListener('click', onDollClick);
    doll.addEventListener('mousedown', (e) => { pressTimer = setTimeout(onLongPress, 800); });
    doll.addEventListener('touchstart', (e) => { pressTimer = setTimeout(onLongPress, 800); });
    doll.addEventListener('mouseup', () => clearTimeout(pressTimer));
    doll.addEventListener('touchend', () => clearTimeout(pressTimer));
    doll.addEventListener('mouseleave', () => clearTimeout(pressTimer));
    doll.addEventListener('mouseenter', () => { blink(); if (blinkInterval) clearInterval(blinkInterval); });
    doll.addEventListener('mouseleave', () => { if (blinkInterval) clearInterval(blinkInterval); blinkInterval = setInterval(blink, 4000); });
    blinkInterval = setInterval(blink, 4000);
    loadDollPosition();
    window.addEventListener('resize', () => { clampDollPosition(); saveDollPosition(); });
    setTimeout(() => showSpeech("✨ 纹样数据库已扩充至118种！单击探索，长按跳转创作~", 6000), 1500);

    // 星河背景动画
    const bgCanvas = document.getElementById('bgCanvas');
    let bgCtx = bgCanvas.getContext('2d');
    let w, h;
    let particles = [], flowBands = [];
    class Particle {
        constructor() { this.x = Math.random() * w; this.y = Math.random() * h; this.r = Math.random() * 2 + 0.5; this.sx = (Math.random() - 0.5) * 0.6; this.sy = (Math.random() - 0.5) * 0.4 - 0.1; this.alpha = Math.random() * 0.5 + 0.2; this.color = `rgba(255,225,160,${this.alpha})`; }
        update() { this.x += this.sx; this.y += this.sy; if (this.x < 0) this.x = w; if (this.x > w) this.x = 0; if (this.y < 0) this.y = h; if (this.y > h) this.y = 0; }
        draw() { bgCtx.beginPath(); bgCtx.arc(this.x, this.y, this.r, 0, Math.PI*2); bgCtx.fillStyle = this.color; bgCtx.fill(); }
    }
    class FlowBand {
        constructor() { this.points = []; this.seg = 30; for(let i=0;i<=this.seg;i++){ let t=i/this.seg; let ang=Math.PI*2*(t+Math.random()*0.1); this.points.push({x:Math.sin(ang)*200+w/2, y:Math.cos(ang)*80+h/2}); } this.speed=0.008+Math.random()*0.01; this.color=`hsla(${Math.random()*30+40},75%,55%,0.15)`; }
        update(time) { for(let i=0;i<=this.seg;i++){ let t=i/this.seg; let ang=Math.PI*2*(t+time*this.speed); let dx=Math.sin(ang)*180*(0.8+Math.sin(time*0.4)*0.2); let dy=Math.cos(ang)*80*(0.8+Math.cos(time*0.6)*0.2); this.points[i].x = w/2+dx; this.points[i].y = h/2+dy+Math.sin(time*1.0+i)*15; } }
        draw() { bgCtx.beginPath(); bgCtx.moveTo(this.points[0].x,this.points[0].y); for(let i=1;i<=this.seg;i++) bgCtx.lineTo(this.points[i].x,this.points[i].y); bgCtx.closePath(); bgCtx.fillStyle=this.color; bgCtx.fill(); }
    }
    function initBg() { w=window.innerWidth; h=window.innerHeight; bgCanvas.width=w; bgCanvas.height=h; particles=[]; for(let i=0;i<300;i++) particles.push(new Particle()); flowBands=[]; for(let i=0;i<3;i++) flowBands.push(new FlowBand()); }
    let bgTime=0;
    function animateBg() { if(!bgCtx) return; bgCtx.clearRect(0,0,w,h); let grad=bgCtx.createLinearGradient(0,0,0,h); grad.addColorStop(0,'#0a0a18'); grad.addColorStop(1,'#151525'); bgCtx.fillStyle=grad; bgCtx.fillRect(0,0,w,h); for(let b of flowBands) b.update(bgTime); for(let b of flowBands) b.draw(); for(let p of particles) { p.update(); p.draw(); } bgTime+=0.012; requestAnimationFrame(animateBg); }
    window.addEventListener('resize', ()=>{ initBg(); clampDollPosition(); saveDollPosition(); });
    initBg(); animateBg();

    renderGrid();
</script>
