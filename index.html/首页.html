<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纹衍星河 · 续写云朵上民族的指尖史诗</title>
    <style>
        :root {
            --bg-deep: #0b0b12;
            --bg-card: #12121d;
            --gold: #c9a96e;
            --gold-light: #e5c687;
            --red: #b34247;
            --red-bright: #d4534a;
            --text-primary: #ede7dd;
            --text-secondary: #b9b3a8;
            --text-muted: #7a7468;
            --border: #2a2838;
            --border-light: #3a3850;
            --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', 'KaiTi', serif;
            --font-sans: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
            --shadow-gold: 0 0 30px rgba(201, 169, 110, 0.25);
            --shadow-red: 0 0 20px rgba(179, 66, 71, 0.3);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 30px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            margin: 0;
            font-family: var(--font-sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* ============ 导航栏 ============ */
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(11, 11, 18, 0.78);
            backdrop-filter: blur(22px) saturate(140%);
            -webkit-backdrop-filter: blur(22px) saturate(140%);
            border-bottom: 1px solid var(--border);
            transition: var(--transition-smooth);
        }
        .nav.scrolled {
            background: rgba(11, 11, 18, 0.92);
            border-bottom-color: var(--border-light);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 66px;
        }
        .logo {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1.5px;
            transition: var(--transition-fast);
            flex-shrink: 0;
        }
        .logo:hover {
            color: var(--gold-light);
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a855, #c4544a, #a83850);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 0 18px rgba(200, 150, 100, 0.35);
            animation: logoPulse 3s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes logoPulse {
            0%,
            100% {
                box-shadow: 0 0 18px rgba(200, 150, 100, 0.35);
            }
            50% {
                box-shadow: 0 0 30px rgba(220, 170, 110, 0.6);
            }
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
            align-items: center;
            margin: 0;
            padding: 0;
            flex-shrink: 0;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.88rem;
            letter-spacing: 0.8px;
            transition: var(--transition-fast);
            position: relative;
            padding: 6px 2px;
            white-space: nowrap;
        }
        .nav-links a:hover {
            color: var(--gold-light);
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--gold);
            transition: var(--transition-smooth);
            border-radius: 1px;
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .nav-links .nav-cta {
            padding: 9px 20px;
            border-radius: 24px;
            background: var(--gold);
            color: #1a1a14 !important;
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 0.85rem;
            transition: var(--transition-bounce);
        }
        .nav-links .nav-cta:hover {
            background: #d9bc82;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 169, 110, 0.35);
        }
        .nav-links .nav-cta::after {
            display: none;
        }

        /* 登录按钮 */
        .btn-login-nav {
            padding: 9px 18px;
            border-radius: 24px;
            border: 1.5px solid var(--border-light);
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 0.8px;
            transition: var(--transition-smooth);
            font-family: var(--font-sans);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-login-nav:hover {
            border-color: var(--gold);
            color: var(--gold-light);
            box-shadow: var(--shadow-gold);
        }
        .btn-login-nav .user-avatar-mini {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--red));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #fff;
            font-weight: 700;
        }
        .user-dropdown {
            position: relative;
            display: inline-block;
        }
        .user-dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 8px 0;
            min-width: 170px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: var(--transition-smooth);
            z-index: 1001;
        }
        .user-dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .user-dropdown-menu button {
            display: block;
            width: 100%;
            padding: 10px 20px;
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            text-align: left;
            transition: var(--transition-fast);
            font-family: var(--font-sans);
            letter-spacing: 0.5px;
        }
        .user-dropdown-menu button:hover {
            background: rgba(201, 169, 110, 0.1);
            color: var(--gold-light);
        }
        .user-dropdown-menu .divider {
            height: 1px;
            background: var(--border);
            margin: 6px 0;
        }

        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            flex-direction: column;
            gap: 5px;
            z-index: 1002;
        }
        .mobile-menu-btn span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 1px;
            transition: var(--transition-smooth);
        }

        /* ============ Hero区域 ============ */
        .hero-3d {
            position: relative;
            height: 100vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #three-container {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        .hero-overlay {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 860px;
            padding: 0 24px;
            pointer-events: none;
        }
        .hero-overlay>* {
            pointer-events: auto;
        }
        .hero-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 22px;
            border: 1.5px solid rgba(201, 169, 110, 0.5);
            background: rgba(11, 11, 18, 0.6);
            color: var(--gold-light);
            font-size: 0.82rem;
            letter-spacing: 2.5px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
            text-shadow: 0 0 6px rgba(200, 160, 100, 0.4);
        }
        .hero-overlay h1 {
            font-family: var(--font-serif);
            font-size: clamp(1.55rem, 4.2vw, 3.5rem);
            font-weight: 700;
            color: #fff;
            text-shadow:
                0 4px 32px rgba(0, 0, 0, 0.75),
                0 0 90px rgba(180, 130, 80, 0.3),
                0 2px 8px rgba(0, 0, 0, 0.6);
            letter-spacing: 3px;
            line-height: 1.3;
            margin: 0 0 16px 0;
            white-space: nowrap;
            animation: fadeInUp 1s ease-out 0.1s both;
        }
        .hero-overlay .highlight {
            background: linear-gradient(135deg, #e5c687, #e4a070, #e07060);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 3px 8px rgba(210, 140, 80, 0.55));
        }
        .hero-overlay .subtitle {
            font-size: clamp(0.95rem, 1.6vw, 1.2rem);
            color: #d5cebf;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out 0.2s both;
        }
        .hero-overlay .desc {
            font-size: 0.88rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 34px;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.45);
            animation: fadeInUp 1s ease-out 0.3s both;
        }
        .hero-btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease-out 0.4s both;
        }
        .btn {
            padding: 14px 34px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-decoration: none;
            transition: var(--transition-bounce);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            font-family: var(--font-sans);
        }
        .btn-primary {
            background: var(--gold);
            color: #1a1a14;
            box-shadow: 0 4px 18px rgba(180, 140, 90, 0.35);
        }
        .btn-primary:hover {
            background: #d9bc82;
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(200, 160, 100, 0.45);
        }
        .btn-outline {
            border: 1.5px solid var(--border-light);
            color: #fff;
            background: rgba(11, 11, 18, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold-light);
            box-shadow: var(--shadow-gold);
            transform: translateY(-2px);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 底部滚动提示 */
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: bounceDown 2s ease-in-out infinite;
            pointer-events: none;
        }
        .scroll-hint span {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-muted);
        }
        .scroll-hint .arrow-down {
            width: 10px;
            height: 10px;
            border-right: 1.5px solid var(--text-muted);
            border-bottom: 1.5px solid var(--text-muted);
            transform: rotate(45deg);
        }
        @keyframes bounceDown {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(10px);
            }
        }

        /* ============ 纹样装饰角标 ============ */
        .corner-embroidery {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            opacity: 0.45;
        }
        .corner-embroidery.top-left {
            top: 80px;
            left: 24px;
            width: 64px;
            height: 64px;
        }
        .corner-embroidery.top-right {
            top: 80px;
            right: 24px;
            width: 64px;
            height: 64px;
        }
        .corner-embroidery.bottom-left {
            bottom: 70px;
            left: 28px;
            width: 52px;
            height: 52px;
        }
        .corner-embroidery.bottom-right {
            bottom: 70px;
            right: 28px;
            width: 52px;
            height: 52px;
        }
        .qiang-diamond {
            width: 100%;
            height: 100%;
            border: 1.5px solid rgba(201, 169, 110, 0.5);
            transform: rotate(45deg);
            border-radius: 3px;
            animation: diamondFloat 6s ease-in-out infinite;
            position: relative;
        }
        .qiang-diamond::after {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid rgba(179, 66, 71, 0.4);
            transform: rotate(0deg);
            border-radius: 2px;
        }
        .qiang-diamond.small {
            width: 80%;
            height: 80%;
            margin: 10%;
            border-color: rgba(201, 169, 110, 0.35);
        }
        @keyframes diamondFloat {
            0%,
            100% {
                transform: rotate(45deg) translateY(0);
            }
            50% {
                transform: rotate(45deg) translateY(-8px);
            }
        }

        /* ============ 登录模态框 ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-smooth);
            padding: 20px;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-dialog {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 430px;
            padding: 36px 30px 28px;
            position: relative;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7), var(--shadow-gold);
            transform: translateY(20px) scale(0.96);
            transition: var(--transition-bounce);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay.active .modal-dialog {
            transform: translateY(0) scale(1);
        }
        .modal-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.6rem;
            cursor: pointer;
            transition: var(--transition-fast);
            padding: 4px 8px;
            line-height: 1;
            border-radius: 50%;
        }
        .modal-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
        }
        .modal-brand {
            text-align: center;
            margin-bottom: 24px;
        }
        .modal-brand .modal-logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a855, #c4544a);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 10px;
            box-shadow: 0 0 22px rgba(200, 150, 100, 0.4);
        }
        .modal-brand h3 {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            color: #fff;
            letter-spacing: 2px;
            margin: 0;
        }
        .modal-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 22px;
            border-bottom: 1px solid var(--border);
        }
        .modal-tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--text-muted);
            transition: var(--transition-fast);
            border-bottom: 2px solid transparent;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: var(--font-sans);
        }
        .modal-tab.active {
            color: var(--gold-light);
            border-bottom-color: var(--gold);
            font-weight: 600;
        }
        .modal-tab:hover {
            color: #d5cebf;
        }
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .modal-form .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .modal-form label {
            font-size: 0.78rem;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .modal-form input {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: var(--transition-fast);
            font-family: var(--font-sans);
            outline: none;
        }
        .modal-form input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }
        .modal-form input::placeholder {
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        .input-row input {
            flex: 1;
            min-width: 0;
        }
        .btn-send-code {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--gold);
            background: transparent;
            color: var(--gold-light);
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
            transition: var(--transition-fast);
            font-family: var(--font-sans);
            flex-shrink: 0;
        }
        .btn-send-code:hover {
            background: rgba(201, 169, 110, 0.1);
        }
        .btn-send-code:disabled {
            border-color: var(--border-light);
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .btn-submit {
            padding: 13px 20px;
            border-radius: 28px;
            background: linear-gradient(135deg, #c9a96e, #b88a50);
            color: #1a1a14;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            border: none;
            transition: var(--transition-bounce);
            font-family: var(--font-sans);
            margin-top: 6px;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #d9bc82, #c99a5c);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(200, 160, 100, 0.4);
        }
        .modal-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        .modal-divider::before,
        .modal-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .social-login-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-social {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid var(--border-light);
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition-bounce);
            color: var(--text-secondary);
        }
        .btn-social:hover {
            border-color: var(--gold);
            color: var(--gold-light);
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold);
        }
        .modal-footer-text {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.6px;
            margin-top: 14px;
        }
        .modal-footer-text a {
            color: var(--gold-light);
            cursor: pointer;
            text-decoration: underline;
            transition: var(--transition-fast);
        }
        .modal-footer-text a:hover {
            color: #f0d89c;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            z-index: 3000;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 12px 24px;
            color: #fff;
            font-size: 0.85rem;
            letter-spacing: 0.8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            transition: var(--transition-bounce);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            border-color: #5a9e6f;
        }
        .toast.error {
            border-color: var(--red-bright);
        }

        /* ============ 响应式 ============ */
        @media (max-width: 900px) {
            .nav-links {
                gap: 10px;
            }
            .nav-links a {
                font-size: 0.78rem;
                letter-spacing: 0.3px;
            }
            .nav-links .nav-cta {
                padding: 7px 14px;
                font-size: 0.75rem;
            }
            .btn-login-nav {
                padding: 7px 12px;
                font-size: 0.75rem;
                gap: 4px;
            }
            .corner-embroidery {
                opacity: 0.3;
            }
            .corner-embroidery.top-left {
                top: 74px;

    <!-- ==================== Three.js 场景脚本 ==================== -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0b12);
        scene.fog = new THREE.FogExp2(0x0b0b12, 0.00025);

        const camera = new THREE.PerspectiveCamera(
            45,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
        );
        camera.position.set(5, 2.2, 7);
        camera.lookAt(0, 0.1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 3.5;
        controls.maxDistance = 14;
        controls.target.set(0, 0.15, 0);
        controls.update();

        // ---- 材质 ----
        const goldMat = new THREE.MeshStandardMaterial({
            color: 0xc9a96e,
            roughness: 0.28,
            metalness: 0.72,
        });
        const redMat = new THREE.MeshStandardMaterial({
            color: 0xb34247,
            roughness: 0.35,
            metalness: 0.45,
        });
        const warmGoldMat = new THREE.MeshStandardMaterial({
            color: 0xe5c687,
            roughness: 0.22,
            metalness: 0.78,
            emissive: 0x1a1000,
            emissiveIntensity: 0.4,
        });
        const darkRedMat = new THREE.MeshStandardMaterial({
            color: 0x8b2c35,
            roughness: 0.4,
            metalness: 0.35,
        });
        const silkWhiteMat = new THREE.MeshStandardMaterial({
            color: 0xf5efe0,
            roughness: 0.3,
            metalness: 0.1,
            emissive: 0x0a0804,
            emissiveIntensity: 0.25,
        });
        const jadeGreenMat = new THREE.MeshStandardMaterial({
            color: 0x5a8a6a,
            roughness: 0.35,
            metalness: 0.3,
        });

        // ---- 主场景组 ----
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // ---- 中心团花结构（羌绣太阳纹/团团花）----
        const centerFlower = new THREE.Group();

        // 中心球体
        const centerSphere = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 32), warmGoldMat);
        centerFlower.add(centerSphere);

        // 内层环
        const innerRing = new THREE.Mesh(
            new THREE.TorusGeometry(0.38, 0.04, 16, 48),
            goldMat
        );
        innerRing.rotation.x = Math.PI / 2;
        centerFlower.add(innerRing);

        // 中层放射线（模拟绣线放射纹）
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2;
            const lineLen = 0.7;
            const cylinderGeo = new THREE.CylinderGeometry(0.025, 0.025, lineLen, 8);
            const line = new THREE.Mesh(cylinderGeo, i % 3 === 0 ? redMat : goldMat);
            line.position.set(Math.cos(angle) * (0.35 + lineLen / 2), 0, Math.sin(angle) * (0.35 + lineLen / 2));
            line.rotation.z = Math.PI / 2;
            line.rotation.y = -angle + Math.PI / 2;
            centerFlower.add(line);
        }

        // 外层环绕环结
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const r = 1.05;
            const knot = new THREE.Mesh(
                new THREE.TorusKnotGeometry(0.18, 0.055, 40, 8),
                i % 2 === 0 ? goldMat : redMat
            );
            knot.position.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
            knot.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            knot.userData = { baseY: 0, angle, r, phase: Math.random() * Math.PI * 2 };
            centerFlower.add(knot);
        }

        // 最外层细环
        const outerRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.35, 0.025, 16, 72),
            silkWhiteMat
        );
        outerRing.rotation.x = Math.PI / 2.3;
        centerFlower.add(outerRing);

        mainGroup.add(centerFlower);

        // ---- 羊角螺旋纹样（羌族标志性羊角纹）----
        function createRamHornCurve(offsetX, direction) {
            const pts = [];
            const totalPts = 120;
            for (let i = 0; i < totalPts; i++) {
                const t = i / (totalPts - 1);
                const angle = t * Math.PI * 2.8;
                const r = 0.22 + t * 0.9;
                const x = Math.cos(angle) * r * direction + offsetX;
                const y = t * 1.8 - 0.25;
                const z = Math.sin(angle) * r * 0.7;
                pts.push(new THREE.Vector3(x, y, z));
            }
            return new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.6);
        }

        const hornCurveR = createRamHornCurve(0.55, 1);
        const hornCurveL = createRamHornCurve(-0.55, -1);

        const hornTubeR = new THREE.Mesh(
            new THREE.TubeGeometry(hornCurveR, 80, 0.045, 10, false),
            goldMat
        );
        const hornTubeL = new THREE.Mesh(
            new THREE.TubeGeometry(hornCurveL, 80, 0.045, 10, false),
            goldMat
        );
        const hornGroup = new THREE.Group();
        hornGroup.add(hornTubeR);
        hornGroup.add(hornTubeL);
        hornGroup.position.y = -0.3;
        mainGroup.add(hornGroup);

        // ---- 云纹曲线（羌绣云云纹）----
        function createCloudCurve(offsetZ) {
            const pts = [];
            for (let i = 0; i < 80; i++) {
                const t = i / 79;
                const x = Math.sin(t * Math.PI * 4) * 0.7 + Math.cos(t * Math.PI * 1.5) * 0.35;
                const y = t * 0.6 - 0.3;
                const z = offsetZ + Math.cos(t * Math.PI * 3) * 0.25;
                pts.push(new THREE.Vector3(x, y, z));
            }
            return new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
        }
        const cloudCurve1 = createCloudCurve(1.3);
        const cloudCurve2 = createCloudCurve(-1.3);
        const cloudTube1 = new THREE.Mesh(
            new THREE.TubeGeometry(cloudCurve1, 60, 0.03, 8, false),
            silkWhiteMat
        );
        const cloudTube2 = new THREE.Mesh(
            new THREE.TubeGeometry(cloudCurve2, 60, 0.03, 8, false),
            silkWhiteMat
        );
        const cloudGroup = new THREE.Group();
        cloudGroup.add(cloudTube1);
        cloudGroup.add(cloudTube2);
        cloudGroup.position.y = 0.5;
        mainGroup.add(cloudGroup);

        // ---- 漂浮几何碎片（绣片碎片化重组）----
        const fragmentsGroup = new THREE.Group();
        const fragGeos = [
            new THREE.OctahedronGeometry(0.08, 0),
            new THREE.TetrahedronGeometry(0.09, 0),
            new THREE.IcosahedronGeometry(0.07, 0),
            new THREE.ConeGeometry(0.06, 0.16, 6),
            new THREE.DodecahedronGeometry(0.07, 0),
        ];
        for (let i = 0; i < 35; i++) {
            const geo = fragGeos[Math.floor(Math.random() * fragGeos.length)];
            const mat = [goldMat, redMat, silkWhiteMat, jadeGreenMat, darkRedMat][Math.floor(Math.random() * 5)];
            const frag = new THREE.Mesh(geo, mat);
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI * 0.7;
            const dist = 1.6 + Math.random() * 3.5;
            frag.position.set(
                Math.cos(theta) * Math.cos(phi) * dist,
                (Math.random() - 0.5) * 3.5,
                Math.sin(theta) * Math.cos(phi) * dist
            );
            frag.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            frag.userData = {
                speed: 0.15 + Math.random() * 0.6,
                axis: new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize(),
                floatAmp: 0.3 + Math.random() * 0.9,
                floatPhase: Math.random() * Math.PI * 2,
            };
            fragmentsGroup.add(frag);
        }
        mainGroup.add(fragmentsGroup);

        // ---- 粒子绣线系统 ----
        const particlesGroup = new THREE.Group();
        const particlesCount = 500;
        const particlesGeo = new THREE.BufferGeometry();
        const particlesPositions = new Float32Array(particlesCount * 3);
        const particlesSizes = new Float32Array(particlesCount);
        for (let i = 0; i < particlesCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;
            const dist = 1.4 + Math.random() * 4.5;
            particlesPositions[i * 3] = Math.cos(theta) * Math.cos(phi) * dist;
            particlesPositions[i * 3 + 1] = (Math.random() - 0.5) * 4.5;
            particlesPositions[i * 3 + 2] = Math.sin(theta) * Math.cos(phi) * dist;
            particlesSizes[i] = Math.random() * 3.5 + 1;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlesPositions, 3));
        particlesGeo.setAttribute('size', new THREE.BufferAttribute(particlesSizes, 1));
        const particlesMat = new THREE.PointsMaterial({
            color: 0xe8d5a3,
            size: 0.025,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.7,
        });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        particlesGroup.add(particles);

        // 金色粒子环
        const ringParticlesCount = 200;
        const ringParticlesGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringParticlesCount * 3);
        for (let i = 0; i < ringParticlesCount; i++) {
            const angle = (i / ringParticlesCount) * Math.PI * 2;
            const r = 1.55 + (Math.random() - 0.5) * 0.35;
            const y = (Math.random() - 0.5) * 0.5;
            ringPositions[i * 3] = Math.cos(angle) * r;
            ringPositions[i * 3 + 1] = y;
            ringPositions[i * 3 + 2] = Math.sin(angle) * r;
        }
        ringParticlesGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringParticles = new THREE.Points(ringParticlesGeo, new THREE.PointsMaterial({
            color: 0xc9a96e,
            size: 0.02,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.6,
        }));
        particlesGroup.add(ringParticles);

        mainGroup.add(particlesGroup);

        // ---- 光照 ----
        scene.add(new THREE.AmbientLight(0x3a3550, 0.55));
        const keyLight = new THREE.DirectionalLight(0xffeedd, 1.05);
        keyLight.position.set(3, 4, 5);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 1024;
        keyLight.shadow.mapSize.height = 1024;
        keyLight.shadow.camera.near = 0.5;
        keyLight.shadow.camera.far = 30;
        keyLight.shadow.camera.left = -8;
        keyLight.shadow.camera.right = 8;
        keyLight.shadow.camera.top = 8;
        keyLight.shadow.camera.bottom = -8;
        keyLight.shadow.bias = -0.0001;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xb8c8e0, 0.4);
        fillLight.position.set(-2, 1, -3);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xff9060, 0.55);
        rimLight.position.set(0, -0.5, 3);
        scene.add(rimLight);

        const pointLight1 = new THREE.PointLight(0xc9a96e, 0.8, 8, 1.5);
        pointLight1.position.set(2, 1.5, 2);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xb34247, 0.5, 6, 1.5);
        pointLight2.position.set(-2, -0.5, -2);
        scene.add(pointLight2);

        // ---- 动画循环 ----
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            // 中心团花微动
            centerFlower.rotation.y += 0.0015;
            centerFlower.children.forEach((child, idx) => {
                if (child.userData && child.userData.baseY !== undefined) {
                    child.position.y =
                        child.userData.baseY + Math.sin(elapsed * 1.8 + child.userData.phase) * 0.12;
                }
            });
            innerRing.rotation.z += 0.003;
            outerRing.rotation.z -= 0.002;

            // 羊角组微动
            hornGroup.rotation.y += 0.0008;
            hornGroup.position.y = -0.3 + Math.sin(elapsed * 0.7) * 0.2;

            // 云纹组
            cloudGroup.rotation.y += 0.0006;
            cloudGroup.position.y = 0.5 + Math.cos(elapsed * 0.55) * 0.25;

            // 碎片旋转
            fragmentsGroup.children.forEach((frag) => {
                frag.rotateOnWorldAxis(frag.userData.axis, frag.userData.speed * 0.015);
                frag.position.y += Math.sin(elapsed * frag.userData.speed + frag.userData.floatPhase) * 0.004;
            });
            fragmentsGroup.rotation.y += 0.0004;

            // 粒子微动
            particlesGroup.rotation.y += 0.0003;
            particlesGroup.rotation.x += 0.0002;
            ringParticles.rotation.y -= 0.0006;

            // 主组缓慢旋转
            mainGroup.rotation.y += 0.001;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // ---- 响应式处理 ----
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // 导出以便外部使用
        window.__threeScene = { scene, camera, renderer, controls, mainGroup };
    </script>

    <!-- ==================== 登录系统脚本 ==================== -->
    <script>
        (function() {
            // ---- 状态管理 ----
            const STORAGE_KEY = 'wenyan_user_session';
            let currentUser = null;
            let currentModalTab = 'login';
            let codeCountdown = 0;
            let codeTimer = null;

            // 从localStorage恢复登录状态
            function loadSession() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data && data.nickname && data.timestamp) {
                            // 会话有效期7天
                            if (Date.now() - data.timestamp < 7 * 24 * 60 * 60 * 1000) {
                                currentUser = data;
                            } else {
                                localStorage.removeItem(STORAGE_KEY);
                            }
                        }
                    }
                } catch (e) {
                    currentUser = null;
                }
                updateNavUI();
            }

            function saveSession(user) {
                currentUser = { ...user, timestamp: Date.now() };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(currentUser));
                updateNavUI();
            }

            function clearSession() {
                currentUser = null;
                localStorage.removeItem(STORAGE_KEY);
                updateNavUI();
            }

            function updateNavUI() {
                const loginNavItem = document.getElementById('loginNavItem');
                const userNavItem = document.getElementById('userNavItem');
                const userNameNav = document.getElementById('userNameNav');
                const userAvatarMini = document.getElementById('userAvatarMini');

                if (currentUser && currentUser.nickname) {
                    if (loginNavItem) loginNavItem.style.display = 'none';
                    if (userNavItem) userNavItem.style.display = 'list-item';
                    if (userNameNav) userNameNav.textContent = currentUser.nickname;
                    if (userAvatarMini) userAvatarMini.textContent = currentUser.nickname.charAt(0).toUpperCase();
                } else {
                    if (loginNavItem) loginNavItem.style.display = 'list-item';
                    if (userNavItem) userNavItem.style.display = 'none';
                    if (userNameNav) userNameNav.textContent = '用户';
                    if (userAvatarMini) userAvatarMini.textContent = '👤';
                }
            }

            // ---- Toast提示 ----
            window.showToast = function(message, type = '') {
                const toast = document.getElementById('toastEl');
                if (!toast) return;
                toast.textContent = message;
                toast.className = 'toast ' + type + ' show';
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.className = 'toast';
                }, 2200);
            };

            // ---- 模态框操作 ----
            window.openLoginModal = function() {
                const overlay = document.getElementById('loginModalOverlay');
                if (overlay) {
                    overlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                    switchModalTab('login');
                    // 清空表单
                    clearForms();
                }
            };

            window.closeLoginModal = function() {
                const overlay = document.getElementById('loginModalOverlay');
                if (overlay) {
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
                // 关闭用户下拉菜单
                const menu = document.getElementById('userDropdownMenu');
                if (menu) menu.classList.remove('show');
            };

            window.closeLoginModalOutside = function(event) {
                if (event.target === event.currentTarget) {
                    closeLoginModal();
                }
            };

            function clearForms() {
                const formLogin = document.getElementById('formLogin');
                const formRegister = document.getElementById('formRegister');
                if (formLogin) formLogin.reset();
                if (formRegister) formRegister.reset();
                resetCodeButton();
            }

            // ---- 标签切换 ----
            window.switchModalTab = function(tab) {
                currentModalTab = tab;
                const tabLogin = document.getElementById('tabLogin');
                const tabRegister = document.getElementById('tabRegister');
                const formLogin = document.getElementById('formLogin');
                const formRegister = document.getElementById('formRegister');

                if (tab === 'login') {
                    tabLogin.classList.add('active');
                    tabRegister.classList.remove('active');
                    formLogin.style.display = 'flex';
                    formRegister.style.display = 'none';
                } else {
                    tabRegister.classList.add('active');
                    tabLogin.classList.remove('active');
                    formRegister.style.display = 'flex';
                    formLogin.style.display = 'none';
                }
                resetCodeButton();
            };

            // ---- 验证码倒计时 ----
            window.sendVerificationCode = function() {
                if (codeCountdown > 0) return;
                const phoneInput = document.getElementById('regPhone');
                if (!phoneInput || !phoneInput.value.match(/^1[3-9]\d{9}$/)) {
                    showToast('请输入有效的手机号码', 'error');
                    return;
                }
                codeCountdown = 60;
                updateCodeButton();
                showToast('验证码已发送（模拟：123456）', 'success');
                codeTimer = setInterval(() => {
                    codeCountdown--;
                    updateCodeButton();
                    if (codeCountdown <= 0) {
                        clearInterval(codeTimer);
                        codeTimer = null;
                    }
                }, 1000);
            };

            function updateCodeButton() {
                const btn = document.getElementById('btnSendCode');
                if (!btn) return;
                if (codeCountdown > 0) {
                    btn.disabled = true;
                    btn.textContent = codeCountdown + 's 后重发';
                } else {
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }

            function resetCodeButton() {
                codeCountdown = 0;
                if (codeTimer) {
                    clearInterval(codeTimer);
                    codeTimer = null;
                }
                updateCodeButton();
            }

            // ---- 登录提交 ----
            window.handleLoginSubmit = function(event) {
                event.preventDefault();
                const account = document.getElementById('loginAccount')?.value?.trim();
                const password = document.getElementById('loginPassword')?.value?.trim();

                if (!account) {
                    showToast('请输入手机号或邮箱', 'error');
                    return;
                }
                if (!password || password.length < 4) {
                    showToast('密码长度至少4位', 'error');
                    return;
                }

                // 模拟登录验证
                const isEmail = account.includes('@');
                const isValidPhone = account.match(/^1[3-9]\d{9}$/);
                const isValidEmail = account.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);

                if (!isEmail && !isValidPhone) {
                    showToast('请输入有效的手机号或邮箱', 'error');
                    return;
                }
                if (isEmail && !isValidEmail) {
                    showToast('邮箱格式不正确', 'error');
                    return;
                }

                // 模拟登录成功
                const nickname = isEmail ? account.split('@')[0] : '羌绣爱好者';
                saveSession({
                    nickname: nickname,
                    account: account,
                    avatar: '',
                });
                showToast('登录成功！欢迎回来 🎉', 'success');
                setTimeout(() => {
                    closeLoginModal();
                }, 600);
            };

            // ---- 注册提交 ----
            window.handleRegisterSubmit = function(event) {
                event.preventDefault();
                const phone = document.getElementById('regPhone')?.value?.trim();
                const code = document.getElementById('regCode')?.value?.trim();
                const password = document.getElementById('regPassword')?.value?.trim();
                const nickname = document.getElementById('regNickname')?.value?.trim();

                if (!phone || !phone.match(/^1[3-9]\d{9}$/)) {
                    showToast('请输入有效的手机号码', 'error');
                    return;
                }
                if (!code || code.length < 4) {
                    showToast('请输入验证码', 'error');
                    return;
                }
                // 模拟验证码校验
                if (code !== '123456' && code !== '888888') {
                    showToast('验证码错误（模拟正确码：123456）', 'error');
                    return;
                }
                if (!password || password.length < 6) {
                    showToast('密码长度至少6位', 'error');
                    return;
                }

                const finalNickname = nickname || '羌寨新秀';
                saveSession({
                    nickname: finalNickname,
                    account: phone,
                    avatar: '',
                });
                showToast('注册成功！欢迎加入纹衍星河 ✨', 'success');
                setTimeout(() => {
                    closeLoginModal();
                }, 600);
            };

            // ---- 用户菜单 ----
            window.toggleUserMenu = function() {
                const menu = document.getElementById('userDropdownMenu');
                if (!menu) return;
                menu.classList.toggle('show');
            };

            window.handleLogout = function() {
                clearSession();
                showToast('已安全退出 👋', '');
                const menu = document.getElementById('userDropdownMenu');
                if (menu) menu.classList.remove('show');
            };

            // 点击其他地方关闭用户菜单
            document.addEventListener('click', function(e) {
                const dropdown = document.getElementById('userDropdown');
                const menu = document.getElementById('userDropdownMenu');
                if (dropdown && menu && !dropdown.contains(e.target)) {
                    menu.classList.remove('show');
                }
            });

            // ESC关闭模态框
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeLoginModal();
                }
            });

            // ---- 导航栏滚动效果 ----
            function handleNavScroll() {
                const nav = document.getElementById('mainNav');
                if (!nav) return;
                if (window.scrollY > 50) {
                    nav.classList.add('scrolled');
                } else {
                    nav.classList.remove('scrolled');
                }
            }
            window.addEventListener('scroll', handleNavScroll, { passive: true });

            // ---- 移动端菜单 ----
            window.toggleMobileMenu = function() {
                const navLinks = document.getElementById('navLinks');
                if (!navLinks) return;
                const isVisible = navLinks.classList.contains('mobile-visible');
                if (isVisible) {
                    navLinks.classList.remove('mobile-visible');
                    navLinks.classList.add('mobile-hidden');
                } else {
                    navLinks.classList.remove('mobile-hidden');
                    navLinks.classList.add('mobile-visible');
                }
            };

            // 窗口大小变化时重置移动端菜单
            window.addEventListener('resize', () => {
                const navLinks = document.getElementById('navLinks');
                if (navLinks && window.innerWidth > 700) {
                    navLinks.classList.remove('mobile-visible', 'mobile-hidden');
                }
            });

            // ---- 初始化 ----
            loadSession();
            handleNavScroll();

            // 暴露方法到全局
            window._auth = {
                getCurrentUser: () => currentUser,
                isLoggedIn: () => !!(currentUser && currentUser.nickname),
                loadSession,
                saveSession,
                clearSession,
            };

            console.log('🪡 纹衍星河 · 登录系统就绪');
            console.log('   （演示验证码：123456）');
        })();
    </script>
</body>
